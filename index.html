<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compile Draft</title>

<style>
body { margin:0; background:#111; color:#fff; font-family:-apple-system; }
header { padding:10px; text-align:center; background:#1a1a1a; }
button { padding:10px; margin:4px; border:none; border-radius:8px; background:#333; color:#fff; }
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; padding:10px; }
.card { padding:16px; background:#222; border-radius:10px; text-align:center; }
.history { padding:10px; font-size:12px; }
</style>
</head>

<body>

<header>
<div id="auth"></div>
<button id="loginBtn">Login Google</button>
<button id="logoutBtn">Logout</button>
<button id="novaBtn">Nova</button>
</header>

<div id="grid" class="grid"></div>

<div>
A: <span id="A"></span><br>
B: <span id="B"></span>
</div>

<div class="history">
<b>Histórico</b>
<div id="history"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAZ0oBi3JraRKxxMQ3Gai7vgZZOL86sB-A",
  authDomain: "compile-draft-23ef2.firebaseapp.com",
  projectId: "compile-draft-23ef2",
  appId: "1:357072569533:web:3975e4a51462e5c09c23d4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// ===== ESTADO =====
let currentUser = null;
let pool = ["Apathy","Clarity","Darkness","Fear","Hate","Light","Metal","Plague","Speed","Unity"];
let restantes = [];
let picks = {A:[], B:[]};
let turno = 0;
const ordem = ["A","B","B","A","A","B"];

// ===== ELEMENTOS =====
const authDiv = document.getElementById("auth");
const grid = document.getElementById("grid");
const Ael = document.getElementById("A");
const Bel = document.getElementById("B");
const historyDiv = document.getElementById("history");

// ===== AUTH =====
onAuthStateChanged(auth, user=>{
    currentUser = user;
    authDiv.innerText = user ? `👤 ${user.displayName}` : "não logado";
});

// ===== BOTÕES =====
document.getElementById("loginBtn").onclick = ()=>signInWithPopup(auth, provider);
document.getElementById("logoutBtn").onclick = ()=>signOut(auth);
document.getElementById("novaBtn").onclick = novaPartida;

// ===== JOGO =====
function novaPartida(){
    restantes = [...pool].sort(()=>Math.random()-0.5).slice(0,6);
    picks = {A:[],B:[]};
    turno = 0;
    render();
}

function clicar(c){
    let j = ordem[turno];
    picks[j].push(c);
    restantes = restantes.filter(x=>x!==c);
    turno++;

    if(turno===6) salvar();

    render();
}

// ===== FIREBASE =====
async function salvar(){
    if(!currentUser){
        alert("login necessário");
        return;
    }

    await addDoc(collection(db,"matches"),{
        A:picks.A.join(", "),
        B:picks.B.join(", "),
        user: currentUser.displayName
    });

    carregar();
}

async function carregar(){
    const snap = await getDocs(collection(db,"matches"));
    historyDiv.innerHTML="";
    snap.forEach(d=>{
        let h = d.data();
        historyDiv.innerHTML += `<div>${h.user}<br>${h.A}<br>${h.B}</div><hr>`;
    });
}

// ===== UI =====
function render(){
    Ael.innerText = picks.A.join(", ");
    Bel.innerText = picks.B.join(", ");

    grid.innerHTML="";
    restantes.forEach(c=>{
        let el = document.createElement("div");
        el.className="card";
        el.innerText=c;
        el.onclick=()=>clicar(c);
        grid.appendChild(el);
    });
}

// init
carregar();

</script>

</body>
</html>
