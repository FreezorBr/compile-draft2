<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compile Draft</title>

<style>
body { margin:0; background:#111; color:#fff; font-family:-apple-system; }
header { padding:10px; text-align:center; background:#1a1a1a; }

button { padding:10px; margin:4px; border:none; border-radius:8px; background:#333; color:#fff; }
button.small { padding:6px 8px; font-size:12px; }

input { width:60px; text-align:center; border-radius:6px; border:none; }

.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; padding:10px; }

.card { padding:16px; background:#222; border-radius:10px; text-align:center; }

.ban { background:#8b0000!important; }
.pickA { background:#2b4eff!important; }
.pickB { background:#2faa2f!important; }

.players { display:flex; justify-content:space-around; padding:10px; }

.box { width:45%; padding:8px; border-radius:8px; background:#1a1a1a; }

.activeA { outline:2px solid #2b4eff; }
.activeB { outline:2px solid #2faa2f; }

.history { padding:10px; font-size:12px; max-height:260px; overflow:auto; border-top:1px solid #333; }

.status { margin-top:6px; font-size:14px; }

table { width:100%; border-collapse:collapse; margin-top:8px; }
td,th { border-bottom:1px solid #333; padding:4px; font-size:11px; }
</style>
</head>

<body>

<header>
Prot <input id="numProt" value="9">
Bans <input id="numBan" value="2">
Seed <input id="seedInput" placeholder="auto">
<br>
<button onclick="novaPartida()">Nova</button>
<button onclick="resetPool()">Reset Pool</button>

<div class="status" id="status"></div>
Pool: <span id="poolSize"></span>
</header>

<div class="grid" id="grid"></div>

<div class="players">
<div id="boxA" class="box">A:<br><span id="A"></span></div>
<div id="boxB" class="box">B:<br><span id="B"></span></div>
</div>

<div class="history">
<b>Histórico</b>
<div id="history"></div>
</div>

<div class="history">
<b>Dashboard</b>
<div id="dashboard"></div>
</div>

<script type="module">

// ===== FIREBASE =====
import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs, 
  deleteDoc, 
  doc, 
  updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app = initializeApp({
  apiKey: "AIzaSyAZ0oBi3JraRKxxMQ3Gai7vgZZOL86sB-A",
  authDomain: "compile-draft-23ef2.firebaseapp.com",
  projectId: "compile-draft-23ef2",
  storageBucket: "compile-draft-23ef2.firebasestorage.app",
  messagingSenderId: "357072569533",
  appId: "1:357072569533:web:3975e4a51462e5c09c23d4"
});

const db = getFirestore(app);

// ===== DADOS =====
let poolInicial = [
"Apathy","Clarity","Darkness","Fear","Hate","Light","Metal","Plague","Speed","Unity",
"Assimilation","Corruption","Death","Fire","Ice","Love","Mirror","Psychic","Spirit","War",
"Chaos","Courage","Diversity","Gravity","Life","Luck","Peace","Smoke","Time","Water"
];

let pool=[...poolInicial];
let restantes=[], picks={A:[],B:[]};
let fase="", bansRestantes=0, jogadorBan="A";
let turno=0;
const ordem=["A","B","B","A","A","B"];

let historico=[];
let stack=[];

// ===== UTILS =====
function shuffle(a){
    for(let i=a.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
}

// ===== HISTÓRICO FIREBASE =====
async function salvarHistorico(){
    await addDoc(collection(db,"matches"),{
        A:picks.A.join(", "),
        B:picks.B.join(", "),
        winner:null,
        createdAt:Date.now()
    });
}

async function carregarHistorico(){
    const snap = await getDocs(collection(db,"matches"));
    historico=[];
    snap.forEach(d=>historico.push({id:d.id,...d.data()}));
    historico.sort((a,b)=>b.createdAt-a.createdAt);
    render();
}

async function setWinner(i,p){
    let h = historico[i];

    await updateDoc(doc(db,"matches",h.id), {
        winner: p
    });

    carregarHistorico();
}

async function deleteMatch(i){
    let h=historico[i];
    await deleteDoc(doc(db,"matches",h.id));
    carregarHistorico();
}

// ===== RENDER =====
function render(){
    poolSize.innerText=pool.length;
    A.innerText=picks.A.join(", ");
    B.innerText=picks.B.join(", ");

    grid.innerHTML="";
    restantes.forEach(c=>{
        let el=document.createElement("div");
        el.className="card";
        el.innerText=c;
        el.onclick=()=>clicar(c);
        grid.appendChild(el);
    });

    renderHistory();
    renderDashboard();
}

function renderHistory(){
    document.getElementById("history").innerHTML = historico.map((h)=>`
    <div>
    A:${h.A}<br>B:${h.B}<br>
    <button onclick="setWinnerById('${h.id}','A')">A venceu</button>
<button onclick="setWinnerById('${h.id}','A')">
<button onclick="deleteMatchById('${h.id}')">
    </div><hr>
    `).join("");
}
  async function setWinnerById(id,p){
    await updateDoc(doc(db,"matches",id), {
        winner: p
    });

    carregarHistorico();
}

async function deleteMatchById(id){
    await deleteDoc(doc(db,"matches",id));
    carregarHistorico();
}

// ===== DASHBOARD =====
function renderDashboard(){
    let valid=historico.filter(h=>h.winner);
    if(!valid.length){dashboard.innerHTML="Sem dados";return;}

    let stats={},combos={};

    valid.forEach(h=>{
        let A=h.A.split(", "),B=h.B.split(", ");
        [...A,...B].forEach(p=>{
            if(!stats[p])stats[p]={p:0,w:0};
            stats[p].p++;
        });

        (h.winner==="A"?A:B).forEach(p=>stats[p].w++);

        function pairs(t,w){
            for(let i=0;i<t.length;i++){
                for(let j=i+1;j<t.length;j++){
                    let k=[t[i],t[j]].sort().join("+");
                    if(!combos[k])combos[k]={p:0,w:0};
                    combos[k].p++;
                    if(w)combos[k].w++;
                }
            }
        }

        pairs(A,h.winner==="A");
        pairs(B,h.winner==="B");
    });

    let lista=Object.entries(stats).map(([n,v])=>({
        n,wr:v.w/v.p
    })).sort((a,b)=>b.wr-a.wr);

    let comb=Object.entries(combos).map(([n,v])=>({
        n,wr:v.w/v.p
    })).sort((a,b)=>b.wr-a.wr);

    dashboard.innerHTML=`
    <b>Top Protocolos</b>
    ${lista.slice(0,5).map(x=>`${x.n} ${(x.wr*100).toFixed(0)}%`).join("<br>")}
    <br><br>
    <b>Combos</b>
    ${comb.slice(0,5).map(x=>`${x.n} ${(x.wr*100).toFixed(0)}%`).join("<br>")}
    `;
}

// ===== GAME =====
function novaPartida(){
    restantes=shuffle([...pool]).slice(0,numProt.value);
    picks = {
    A: [],
    B: []
};
    fase="draft";
    turno=0;
    render();
}

function clicar(c){
    if(turno >= ordem.length) return;

    let j = ordem[turno];

    if(!picks[j]){
        picks[j] = [];
    }

    picks[j].push(c);

    // 🎨 cor visual
    const cards = document.querySelectorAll(".card");
    cards.forEach(card=>{
        if(card.innerText === c){
            card.classList.add(j === "A" ? "pickA" : "pickB");
        }
    });

    tocarSom(j);

    restantes = restantes.filter(x=>x!==c);

    turno++;

    if(turno===6) finalizar();

    render();
}

async function finalizar(){
    let usados=[...picks.A,...picks.B];
    pool=pool.filter(p=>!usados.includes(p));
    await salvarHistorico();
    carregarHistorico();
}

function resetPool(){
    pool=[...poolInicial];
    render();
}
  
window.novaPartida = novaPartida;
window.resetPool = resetPool;

window.setWinnerById = setWinnerById;
window.deleteMatchById = deleteMatchById;
// ===== INIT =====
carregarHistorico();

</script>

</body>
</html>
